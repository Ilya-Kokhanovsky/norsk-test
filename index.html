<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norsk Verb Tests · Catalog</title>
  <link rel="stylesheet" href="styles/min/tailwind.min.css" />
  <link rel="stylesheet" href="styles/min/foundation.min.css" />
  <link rel="stylesheet" href="styles/min/app.min.css" />
</head>
<body data-home-url="index.html" data-catalog-path="data/tests/catalog.json" data-i18n-path="./locales" class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div data-component-src="components/site-header.html"></div>

  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-24 -left-20 h-72 w-72 rounded-full bg-teal-200/35 blur-3xl"></div>
    <div class="absolute top-1/3 -right-24 h-80 w-80 rounded-full bg-orange-200/35 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-64 w-64 rounded-full bg-sky-200/30 blur-3xl"></div>
  </div>

  <main class="mx-auto w-full max-w-6xl px-4 pb-10 pt-10 sm:px-6 sm:pt-12">
    <section class="rounded-3xl border border-white/70 bg-white/80 p-5 shadow-xl backdrop-blur sm:p-8">
      <div class="mb-7 text-center sm:mb-8">
        <span data-i18n="catalog.badge" class="mb-4 inline-block rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-500">Доступные режимы</span>
        <h1 data-i18n="catalog.title" class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">Каталог тестов</h1>
        <p data-i18n="catalog.description" class="mx-auto mt-3 max-w-2xl text-sm leading-relaxed text-slate-500 sm:text-base">
          На главной странице отображаются только доступные тесты. Выберите карточку, чтобы перейти на отдельную страницу конкретного теста.
        </p>
      </div>

      <p id="catalog-state" data-i18n="catalog.loading" class="mb-4 text-sm font-medium text-slate-500">Загрузка каталога...</p>

      <div id="catalog-list" class="grid grid-cols-1 gap-4 lg:grid-cols-2 lg:gap-5">
      </div>
    </section>
  </main>

  <div data-component-src="components/site-footer.html"></div>

  <script defer src="scripts/min/components-loader.min.js"></script>
  <script defer src="scripts/min/catalog.min.js"></script>
</body>
</html>
